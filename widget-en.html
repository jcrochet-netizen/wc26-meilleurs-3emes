/* ---- Scope total sous #wc26-best3 pour ne pas casser le thème ---- */
#wc26-best3{

  --e:#d93636; --e-bg:#fdecec; --e-bd:#f5c9c9;

  --brand1:#1b1f3b; --brand2:#3a2d7d;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink); max-width:760px; margin:0 auto; line-height:1.5;
  -webkit-font-smoothing:antialiased; box-sizing:border-box;
}
#wc26-best3 *{box-sizing:border-box;}
#wc26-best3 .wc26-head{
  background:linear-gradient(135deg,var(--brand1),var(--brand2));
  color:#fff; border-radius:16px 16px 0 0; padding:20px 22px 18px;
}
#wc26-best3 .wc26-title{display:flex; align-items:center; gap:10px;}
#wc26-best3 .wc26-cup{font-size:26px; line-height:1;}
#wc26-best3 .wc26-title h2{margin:0; font-size:21px; font-weight:700; letter-spacing:-.2px; color:#fff;}
#wc26-best3 .wc26-title sup{font-size:.6em;}
#wc26-best3 .wc26-sub{margin:8px 0 0; font-size:13.5px; color:rgba(255,255,255,.82); max-width:60ch;}
#wc26-best3 .wc26-sub sup{font-size:.7em;}

#wc26-best3 .wc26-legend{
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:8px 14px; background:#fbfbfd; border:1px solid var(--line);
  border-radius:12px 12px 0 0;
}
#wc26-best3 .wc26-pill{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600;}
#wc26-best3 .wc26-dot{width:11px; height:11px; border-radius:50%; display:inline-block;}
#wc26-best3 .wc26-pill-q .wc26-dot{background:var(--q);} #wc26-best3 .wc26-pill-q{color:var(--q);}
#wc26-best3 .wc26-pill-e .wc26-dot{background:var(--e);} #wc26-best3 .wc26-pill-e{color:var(--e);}
#wc26-best3 .wc26-updated{margin-left:auto; font-size:12px; color:var(--muted);}

#wc26-best3 .wc26-tablewrap{border:1px solid var(--line); border-top:none; overflow-x:auto;}
#wc26-best3 .wc26-table{width:100%; border-collapse:collapse; font-size:14px; min-width:520px;}
#wc26-best3 .wc26-table thead th{
  text-align:center; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;
  color:var(--muted); padding:7px 7px; background:#f2f3f7; border-bottom:1px solid var(--line); white-space:nowrap;
}
#wc26-best3 .wc26-c-team{text-align:left !important;}
#wc26-best3 .wc26-table tbody td{padding:0; border-bottom:1px solid var(--line); text-align:center; vertical-align:middle;}
#wc26-best3 .wc26-table tbody tr{background:var(--row);}
#wc26-best3 .wc26-table tbody tr:nth-child(even){background:var(--row-alt);}
#wc26-best3 .wc26-table tbody td > div{padding:6px 7px;}

#wc26-best3 .wc26-pos{position:relative; font-weight:700; font-variant-numeric:tabular-nums;}
#wc26-best3 tr.is-q .wc26-pos::before,
#wc26-best3 tr.is-e .wc26-pos::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px;}
#wc26-best3 tr.is-q .wc26-pos::before{background:var(--q);}
#wc26-best3 tr.is-e .wc26-pos::before{background:var(--e);}

#wc26-best3 .wc26-grp{font-weight:700; color:var(--muted);}
#wc26-best3 .wc26-teamcell{display:flex !important; align-items:center; gap:10px; text-align:left;}
#wc26-best3 .wc26-flag{width:22px; height:22px; border-radius:3px; object-fit:contain; flex:none; background:#fff;}
#wc26-best3 .wc26-name{font-weight:600;}
#wc26-best3 .wc26-num{font-variant-numeric:tabular-nums; color:#33405a;}
#wc26-best3 .wc26-pts{font-weight:800; font-size:15px; font-variant-numeric:tabular-nums;}

#wc26-best3 tr.is-q{ } /* fond géré ci-dessous pour garder le zébrage */
#wc26-best3 tr.is-q td{background:linear-gradient(0deg,var(--q-bg),var(--q-bg));}
#wc26-best3 tr.is-e td{background:linear-gradient(0deg,var(--e-bg),var(--e-bg));}
#wc26-best3 tr.is-q .wc26-pts{color:var(--q);}
#wc26-best3 tr.is-e .wc26-pts{color:var(--e);}

#wc26-best3 tr.wc26-cutline td{
  padding:0; border:none; background:transparent;
}
#wc26-best3 tr.wc26-cutline .wc26-cut{
  display:flex; align-items:center; gap:10px; padding:4px 14px;
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--e);
  background:#fff;
}
#wc26-best3 tr.wc26-cutline .wc26-cut::before,
#wc26-best3 tr.wc26-cutline .wc26-cut::after{content:""; flex:1; height:1px; background:repeating-linear-gradient(90deg,var(--e-bd) 0 6px,transparent 6px 12px);}

#wc26-best3 .wc26-note{margin:8px 4px 0; font-size:11px; color:var(--muted); line-height:1.45;}
#wc26-best3 .wc26-source{margin:4px 4px 0; font-size:11.5px; color:var(--muted);}
#wc26-best3 .wc26-source a{color:var(--brand2); text-decoration:none; font-weight:600;}
#wc26-best3 .wc26-source a:hover{text-decoration:underline;}

#wc26-best3[data-state="loading"] .wc26-tablewrap::after{
  content:""; display:block; height:120px;
}

@media (max-width:560px){
  /* On masque Fair-Play et FIFA, et on laisse les 6 colonnes utiles tenir

  #wc26-best3 .wc26-c-fifa, #wc26-best3 .wc26-fifa-cell{display:none;}
  #wc26-best3 .wc26-table{min-width:0; font-size:13px;}
  #wc26-best3 .wc26-table thead th{padding:7px 4px; font-size:10px; letter-spacing:.2px;}
  #wc26-best3 .wc26-table tbody td > div{padding:7px 4px;}
  #wc26-best3 .wc26-teamcell{gap:7px;}
  #wc26-best3 .wc26-flag{width:20px; height:20px;}
  #wc26-best3 .wc26-pts{font-size:14px;}
  #wc26-best3 .wc26-legend{padding:8px 12px; gap:10px;}
  #wc26-best3 .wc26-updated{font-size:11px;}
}
@media (max-width:380px){
  /* Très petits écrans : on réduit encore légèrement le nom des équipes. */

  #wc26-best3 .wc26-table thead th{font-size:9px;}

    "Bosnia and Herzegovina":{fr:"Bosnie-Herzégovine",es:"Bosnia y Herzegovina",pt:"Bósnia e Herzegovina",it:"Bosnia-Erzegovina"},
    "Haiti":{fr:"Haïti",es:"Haití",pt:"Haiti",it:"Haiti"},
    "Austria":{fr:"Autriche",es:"Austria",pt:"Áustria",it:"Austria"},
    "Congo DR":{fr:"RD Congo",es:"RD Congo",pt:"RD Congo",it:"RD Congo"},
    "DR Congo":{fr:"RD Congo",es:"RD Congo",pt:"RD Congo",it:"RD Congo"}
  };
  function translateName(name){
    var m = COUNTRY_NAMES[name];
    return (m && m[WC26_CONFIG.lang]) || name;
  }

  var QUALIFY_COUNT = 8; // 8 meilleurs 3èmes qualifiés

  /* ============================================================
     4) LOGIQUE
     ============================================================ */
  var root = document.getElementById("wc26-best3");
  if(!root) return;
  var L = I18N[WC26_CONFIG.lang] || I18N.fr;

  function pointsFor(t){
    // Si "pts" n'est pas fourni, on ne le calcule pas (la phase de groupes
    // fournit directement les points). On lit t.pts si présent, sinon 0.
    return (typeof t.pts === "number") ? t.pts : 0;
  }

  // Comparateur : critères FIFA a→f
  function compare(a,b){
    var pa=pointsFor(a), pb=pointsFor(b);
    if(pb!==pa) return pb-pa;            // a) points
    if(b.gd!==a.gd) return b.gd-a.gd;    // b) différence de buts
    if(b.gf!==a.gf) return b.gf-a.gf;    // c) buts marqués
    var fa=(typeof a.fair==="number")?a.fair:0, fb=(typeof b.fair==="number")?b.fair:0;
    if(fb!==fa) return fb-fa;            // d) fair-play (plus haut = mieux)
    var ra=(typeof a.fifa==="number")?a.fifa:9999, rb=(typeof b.fifa==="number")?b.fifa:9999;
    return ra-rb;                        // e/f) classement FIFA (plus petit = mieux)
  }

  function esc(s){ var d=document.createElement("div"); d.textContent=String(s==null?"":s); return d.innerHTML; }
  function fmtSigned(n){ return (n>0?"+":"") + n; }

  function applyI18n(){
    root.querySelectorAll("[data-i18n]").forEach(function(el){
      var k=el.getAttribute("data-i18n"); if(L[k]!=null) el.innerHTML=L[k];
    });
    root.querySelectorAll("[data-i18n-attr]").forEach(function(el){
      var attr=el.getAttribute("data-i18n-attr"), k=el.getAttribute("data-i18n-"+attr);
      if(k && L[k]!=null) el.setAttribute(attr, L[k].replace(/<[^>]+>/g,""));
    });
  }

  function render(data){
    var teams = (data.teams||[]).slice().sort(compare);
    var body = document.getElementById("wc26-body");
    body.innerHTML = "";

    teams.forEach(function(t, i){
      var rank = i+1;
      var qualified = rank <= QUALIFY_COUNT;

      // Ligne de séparation qualif/élim juste après le 8ème
      if(rank === QUALIFY_COUNT+1){
        var sep = document.createElement("tr");
        sep.className = "wc26-cutline";
        sep.innerHTML = '<td colspan="8"><div class="wc26-cut">'+esc(L.qualLine)+'</div></td>';
        body.appendChild(sep);
      }

      // Drapeau : logo SportMonks en priorité, sinon flagcdn si code ISO-2.
      var flag = t.logo
        ? '<img class="wc26-flag" loading="lazy" alt="" src="'+esc(t.logo)+'">'
        : (t.code && String(t.code).length===2
            ? '<img class="wc26-flag" loading="lazy" alt="" src="https://flagcdn.com/w40/'+esc(String(t.code).toLowerCase())+'.png">'
            : '');

      var tr = document.createElement("tr");
      tr.className = qualified ? "is-q" : "is-e";
      tr.innerHTML =
        '<td><div class="wc26-pos">'+rank+'</div></td>'+
        '<td><div class="wc26-grp">'+esc(t.group)+'</div></td>'+
        '<td><div class="wc26-teamcell">'+flag+'<span class="wc26-name">'+esc(translateName(t.name))+'</span></div></td>'+
        '<td><div class="wc26-pts">'+pointsFor(t)+'</div></td>'+
        '<td><div class="wc26-num">'+fmtSigned(t.gd||0)+'</div></td>'+
        '<td><div class="wc26-num">'+esc(t.gf!=null?t.gf:"")+'</div></td>'+
        '<td class="wc26-fair-cell"><div class="wc26-num">'+esc(t.fair!=null?t.fair:"")+'</div></td>'+
        '<td class="wc26-fifa-cell"><div class="wc26-num">'+esc(t.fifa!=null?("#"+t.fifa):"")+'</div></td>';
      body.appendChild(tr);
    });

    // Date de mise à jour
    var timeEl = document.getElementById("wc26-time");
    if(data.updated){
      var d = new Date(data.updated);
      if(!isNaN(d)){
        timeEl.textContent = d.toLocaleString(L.locale,{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
        timeEl.setAttribute("datetime", data.updated);
      } else { timeEl.textContent = data.updated; }
    } else {
      var upd = timeEl.closest(".wc26-updated"); if(upd) upd.style.display="none";
    }

    root.setAttribute("data-state","ready");
  }

  function boot(){
    applyI18n();
    if(WC26_CONFIG.dataUrl){
      fetch(WC26_CONFIG.dataUrl, {cache:"no-store"})
        .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(json){ render(json); })
        .catch(function(){ render(WC26_DATA); }); // repli sur les données locales
      if(WC26_CONFIG.refreshSeconds>0){
        setInterval(function(){
          fetch(WC26_CONFIG.dataUrl,{cache:"no-store"})
            .then(function(r){return r.json();}).then(render).catch(function(){});
        }, WC26_CONFIG.refreshSeconds*1000);
      }
    } else {
      render(WC26_DATA);
    }
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
