<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meilleurs 3èmes — Coupe du Monde 2026</title>
  <meta name="description" content="Classement en direct des 8 meilleurs troisièmes de la Coupe du Monde 2026, selon les critères de départage FIFA.">
  <style>
    body{
      margin:0; padding:32px 16px; min-height:100vh;
      background:#f4f5f8;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:#15233b;
    }
    .page{max-width:760px; margin:0 auto;}
    .page h1{font-size:22px; font-weight:700; margin:0 0 4px; letter-spacing:-.2px;}
    .page .lead{font-size:14px; color:#6a7686; margin:0 0 22px;}
    .page footer{margin:26px auto 0; max-width:760px; font-size:12px; color:#9aa3b1; text-align:center;}
    .page footer a{color:#3a2d7d; text-decoration:none;}
  </style>
</head>
<body>
  <div class="page">
    <h1>Meilleurs 3<sup>es</sup> — Coupe du Monde 2026</h1>
    <p class="lead">Les 8 meilleures équipes classées 3<sup>es</sup> (sur 12) se qualifient pour les 16<sup>es</sup> de finale. Classement en direct selon les critères de départage FIFA.</p>

    <div id="app"></div>

    <footer>
      Données : SportMonks + classement FIFA &middot; mise à jour automatique &middot;
      <a href="https://github.com/jcrochet-netizen/wc26-meilleurs-3emes">code source</a>
    </footer>
  </div>

  <script>
    // Charge le widget (source unique) et exécute son script.
    fetch("widget-meilleurs-3emes-wc2026.html", {cache:"no-store"})
      .then(function(r){ return r.text(); })
      .then(function(html){
        var app = document.getElementById("app");
        app.innerHTML = html;
        // Les <script> injectés via innerHTML ne s'exécutent pas : on les recrée.
        app.querySelectorAll("script").forEach(function(old){
          var s = document.createElement("script");
          if(old.src){ s.src = old.src; } else { s.textContent = old.textContent; }
          document.body.appendChild(s);
        });
      })
      .catch(function(e){
        document.getElementById("app").textContent = "Impossible de charger le widget : " + e;
      });
  </script>
</body>
</html>
