name: Refresh WC26 standings

# Régénère data.json depuis SportMonks et commit s'il a changé.
on:
  schedule:
    - cron: "0 */2 * * *"   # toutes les 2 heures (UTC)
  workflow_dispatch: {}      # bouton "Run workflow" manuel

permissions:
  contents: write

concurrency:
  group: refresh-standings
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest standings
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: node fetch-data.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "Aucun changement — rien à commit."
          else
            git add data.json
            git commit -m "chore: refresh WC26 standings [skip ci]"
            git push
            echo "Standings mis à jour et poussés."
          fi
